[package]
name = "libretracks-desktop"
version = "0.0.4"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
base64 = "0.22"
libretracks-audio = { path = "../../../crates/libretracks-audio" }
libretracks-project = { path = "../../../crates/libretracks-project" }
libretracks-remote = { path = "../../../crates/libretracks-remote" }
midir = "0.9"
rtrb = "0.3"
rfd = "0.15"
rayon = "1.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
symphonia = { version = "0.5", default-features = false, features = ["aac", "flac", "isomp4", "mp3", "ogg", "pcm", "vorbis", "wav"] }
tauri = { version = "2", features = [] }
thiserror = "2"
tokio = { version = "1", features = ["sync", "time"] }
tauri-plugin-dialog = "2.7.0"

[dependencies.libretracks-core]
path = "../../../crates/libretracks-core"

[target.'cfg(windows)'.dependencies]
cpal = { version = "0.15", features = ["asio"] }

[target.'cfg(not(windows))'.dependencies]
cpal = "0.15"

[dev-dependencies]
hound = "3"
tempfile = "3"
