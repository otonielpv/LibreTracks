[package]
name = "libretracks-desktop"
version = "0.0.1"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
libretracks-audio = { path = "../../../crates/libretracks-audio" }
libretracks-project = { path = "../../../crates/libretracks-project" }
rodio = "0.20"
rfd = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
thiserror = "2"

[dependencies.libretracks-core]
path = "../../../crates/libretracks-core"

[dev-dependencies]
hound = "3"
tempfile = "3"
