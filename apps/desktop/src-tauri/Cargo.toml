[package]
name = "libretracks-desktop"
version = "0.0.3"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
base64 = "0.22"
cpal = "0.15"
libretracks-audio = { path = "../../../crates/libretracks-audio" }
libretracks-project = { path = "../../../crates/libretracks-project" }
libretracks-remote = { path = "../../../crates/libretracks-remote" }
memmap2 = "0.9"
midir = "0.9"
rtrb = "0.3"
rfd = "0.15"
rayon = "1.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
thiserror = "2"
tokio = { version = "1", features = ["sync", "time"] }

[dependencies.libretracks-core]
path = "../../../crates/libretracks-core"

[dev-dependencies]
hound = "3"
tempfile = "3"
