[package]
name = "libretracks-desktop"
version = "0.0.1"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
cpal = "0.15"
libretracks-audio = { path = "../../../crates/libretracks-audio" }
libretracks-project = { path = "../../../crates/libretracks-project" }
rtrb = "0.3"
rfd = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
symphonia = { version = "0.5", default-features = false, features = ["pcm", "wav"] }
tauri = { version = "2", features = [] }
thiserror = "2"

[dependencies.libretracks-core]
path = "../../../crates/libretracks-core"

[dev-dependencies]
hound = "3"
tempfile = "3"
