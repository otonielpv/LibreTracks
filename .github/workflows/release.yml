name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'x86_64-apple-darwin, aarch64-apple-darwin' || '' }}

      - name: Install LLVM for ASIO bindings
        if: runner.os == 'Windows'
        run: choco install llvm -y

      - name: Prepare Steinberg ASIO SDK
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asioDir = Join-Path $env:RUNNER_TEMP "asio_sdk"
          git clone https://github.com/audiosdk/asio.git $asioDir
          "CPAL_ASIO_DIR=$asioDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm install

      - name: Build remote frontend
        run: npm run build:remote

      - name: Run frontend tests
        run: npm test

      - name: Run backend Rust tests
        run: cargo test --locked -p libretracks-core -p libretracks-project -p libretracks-audio

      - name: Run desktop Rust tests
        env:
          LIBRETRACKS_DUMMY_AUDIO: "1"
        run: cargo test --locked -p libretracks-desktop -- --test-threads=1

  release:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM for ASIO bindings
        if: matrix.platform == 'windows'
        run: choco install llvm -y

      - name: Prepare Steinberg ASIO SDK
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $asioDir = Join-Path $env:RUNNER_TEMP "asio_sdk"
          git clone https://github.com/audiosdk/asio.git $asioDir
          "CPAL_ASIO_DIR=$asioDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm install

      - name: Build remote frontend
        run: npm run build:remote

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_RELEASES_TOKEN: ${{ secrets.GITHUB_RELEASES_TOKEN }}
        with:
          projectPath: 'apps/desktop'
          args: ${{ matrix.platform == 'macos' && '--target universal-apple-darwin' || '' }}
          tagName: ${{ github.ref_name }}
          releaseName: LibreTracks ${{ github.ref_name }}
          releaseBody: See the Assets section to download this version.
          releaseDraft: false
          prerelease: false
