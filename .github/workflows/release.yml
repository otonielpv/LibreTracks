name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  BUNGEE_VERSION: v2.4.24
  BUNGEE_ARCHIVE: https://github.com/bungee-audio-stretch/bungee/releases/download/v2.4.24/bungee-v2.4.24.tgz
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup compiler cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux test dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Install dependencies
        run: npm ci

      - name: Build remote frontend
        run: npm run build:remote

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests without native engine link
        run: cargo test --locked -p libretracks-core -p libretracks-project -p libretracks-audio -p lt-audio-engine-v2 --features lt-audio-engine-v2/no-link

      - name: Configure native engine tests
        run: >
          cmake -S native/audio-engine-v2 -B build/engine-ci-tests
          -DLT_ENGINE_BUILD_TESTS=ON
          -DLT_ENGINE_USE_JUCE=OFF
          -DLT_ENGINE_USE_BUNGEE=OFF
          -DLT_ENGINE_USE_FFMPEG=OFF
          -DLT_ENGINE_USE_LIBSNDFILE=ON
          -DLT_ENGINE_USE_R8BRAIN=ON
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build native engine tests
        run: cmake --build build/engine-ci-tests --config Debug --target lt_engine_tests --parallel

      - name: Run native engine tests
        run: ctest --test-dir build/engine-ci-tests -C Debug --output-on-failure

  build-release-assets:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            publish: true
          - os: macos-latest
            platform: macos
            publish: true
          - os: ubuntu-22.04
            platform: linux
            publish: true
          # Backwards-compat validation only. macOS 13 is the oldest runner
          # GitHub offers — it is not High Sierra (10.13), but it builds the
          # bundle on an older toolchain and runs the cookie-shim symbol guard
          # below, catching regressions that would break launch on 10.13/10.14.
          # publish: false -> it never uploads artifacts, so it cannot collide
          # with the macos-latest release bundle. continue-on-error keeps a
          # flaky old-runner failure from blocking a legitimate release while
          # still surfacing as a red check in the UI.
          - os: macos-13
            platform: macos
            publish: false
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.publish == false }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: matrix.platform == 'macos'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Setup compiler cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libsndfile1-dev rpm
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Configure Windows vcpkg
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_TRIPLET=x64-windows-release" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_OVERLAY_TRIPLETS=$PWD\native\audio-engine-v2\vcpkg-triplets" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Cache Windows vcpkg binary packages
        if: matrix.platform == 'windows'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: release-windows-vcpkg-${{ env.BUNGEE_VERSION }}-${{ hashFiles('native/audio-engine-v2/CMakeLists.txt', 'native/audio-engine-v2/cmake/**/*.cmake', 'native/audio-engine-v2/vcpkg-triplets/*.cmake') }}
          restore-keys: |
            release-windows-vcpkg-${{ env.BUNGEE_VERSION }}-

      - name: Download Bungee runtime
        shell: bash
        run: |
          mkdir -p vendor/bungee
          # Extract only the headers + the current platform's runtime.
          # Extracting the whole archive on Windows fails because the
          # apple-mac/bungee.framework/* entries are symlinks (Versions/
          # Current/...) and bsdtar on the Windows runner can't create
          # symlinks without dev-mode / admin → tar exits 2 and aborts
          # the job. Restricting the extraction to the bits we actually
          # need on each platform side-steps that and also keeps the
          # working tree slim.
          case "${{ matrix.platform }}" in
            linux)
              curl -L "$BUNGEE_ARCHIVE" | tar -xz -C vendor/bungee include linux-x86_64
              ;;
            macos)
              curl -L "$BUNGEE_ARCHIVE" | tar -xz -C vendor/bungee include apple-mac
              ;;
            windows)
              curl -L "$BUNGEE_ARCHIVE" | tar -xz -C vendor/bungee include windows-x86_64
              ;;
            *)
              echo "Unknown platform '${{ matrix.platform }}'" >&2
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: npm ci

      - name: Download ASIO SDK (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          # JUCE's ASIO device type needs iasiodrv.h from the Steinberg ASIO
          # SDK at build time. Steinberg's license forbids us redistributing
          # it, so the SDK is not vendored in the repo — without this step the
          # release DLL builds with JUCE_ASIO=0 and ASIO devices never appear
          # in the installed app (they only show up in local dev builds where
          # the SDK is present on the developer's machine).
          #
          # The public mirror keeps the headers at <root>/common/iasiodrv.h,
          # which is exactly what dependencies.cmake validates against. We
          # expose the checkout path via LT_ASIO_SDK_DIR for the next step.
          git clone --depth 1 https://github.com/audiosdk/asio.git "$PWD/vendor/asiosdk"
          if (-not (Test-Path "$PWD/vendor/asiosdk/common/iasiodrv.h")) {
            Write-Error "ASIO SDK clone did not produce common/iasiodrv.h"
            exit 1
          }
          "LT_ASIO_SDK_DIR=$PWD/vendor/asiosdk" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build native engine release
        shell: pwsh
        run: |
          $bungeeEnabled = "ON"
          $ffmpegEnabled = if ("${{ matrix.platform }}" -eq "windows") { "ON" } else { "OFF" }
          $configureArgs = @(
            "-S", "native/audio-engine-v2",
            "-B", "build/engine-release",
            "-DLT_ENGINE_BUILD_TESTS=OFF",
            "-DLT_ENGINE_USE_JUCE=ON",
            "-DLT_ENGINE_USE_BUNGEE=$bungeeEnabled",
            "-DLT_BUNGEE_DIR=$PWD/vendor/bungee",
            "-DLT_ENGINE_USE_FFMPEG=$ffmpegEnabled",
            "-DLT_ENGINE_USE_LIBSNDFILE=ON",
            "-DLT_ENGINE_USE_R8BRAIN=ON"
          )
          if ($env:CMAKE_TOOLCHAIN_FILE) {
            $configureArgs += "-DCMAKE_TOOLCHAIN_FILE=$env:CMAKE_TOOLCHAIN_FILE"
          }
          if ($env:VCPKG_DEFAULT_TRIPLET) {
            $configureArgs += "-DVCPKG_TARGET_TRIPLET=$env:VCPKG_DEFAULT_TRIPLET"
          }
          if ($env:VCPKG_OVERLAY_TRIPLETS) {
            $configureArgs += "-DVCPKG_OVERLAY_TRIPLETS=$env:VCPKG_OVERLAY_TRIPLETS"
          }
          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            $configureArgs += "-DCMAKE_C_COMPILER_LAUNCHER=sccache"
            $configureArgs += "-DCMAKE_CXX_COMPILER_LAUNCHER=sccache"
          }
          if ($env:LT_ASIO_SDK_DIR) {
            # Enables JUCE_ASIO=1 in dependencies.cmake. Without this the
            # Windows release builds without ASIO device support.
            $configureArgs += "-DLT_ASIO_SDK_DIR=$env:LT_ASIO_SDK_DIR"
          }
          if ("${{ matrix.platform }}" -eq "macos") {
            $env:MACOSX_DEPLOYMENT_TARGET = "10.13"
            $configureArgs += "-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64"
            $configureArgs += "-DCMAKE_OSX_DEPLOYMENT_TARGET=10.13"
            $configureArgs += "-DCMAKE_DISABLE_FIND_PACKAGE_SndFile=ON"
          }
          cmake @configureArgs
          cmake --build build/engine-release --config Release --target lt_audio_engine_v2 --parallel

          $libDir = if ("${{ matrix.platform }}" -eq "windows") { "$PWD/build/engine-release/Release" } else { "$PWD/build/engine-release" }
          "LT_ENGINE_V2_LIB_DIR=$libDir" | Out-File -FilePath $env:GITHUB_ENV -Append

          New-Item -ItemType Directory -Force -Path vendor/bin/native | Out-Null
          Get-ChildItem -Path $libDir -Include "*.dll","*.so","*.dylib" -File -Recurse | Copy-Item -Destination vendor/bin/native -Force
          if ("${{ matrix.platform }}" -eq "linux") {
            Copy-Item vendor/bungee/linux-x86_64/libbungee.so vendor/bin/native -Force
          }
          if ("${{ matrix.platform }}" -eq "macos") {
            Copy-Item vendor/bungee/apple-mac/bungee.framework vendor/bin/native -Recurse -Force
          }

      - name: Verify ASIO compiled into release engine (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          # Guard against silent ASIO loss. JUCE only compiles its ASIO device
          # type when JUCE_ASIO=1, which depends on LT_ASIO_SDK_DIR resolving to
          # a valid SDK. If that ever regresses the build still succeeds but the
          # installed app loses ASIO devices — a defect users only hit after
          # download. We detect the ASIO device-type strings JUCE bakes into the
          # DLL (stored UTF-16LE) and fail the job if they're absent.
          $dll = "$PWD/vendor/bin/native/lt_audio_engine_v2.dll"
          if (-not (Test-Path $dll)) {
            Write-Error "Engine DLL not found at $dll"
            exit 1
          }
          $bytes = [System.IO.File]::ReadAllBytes($dll)
          $text = [System.Text.Encoding]::Unicode.GetString($bytes)
          if ($text -notmatch 'ASIO') {
            Write-Error "Release engine DLL has no ASIO support compiled in (JUCE_ASIO was not enabled). Check the ASIO SDK download step and LT_ASIO_SDK_DIR."
            exit 1
          }
          Write-Host "ASIO support confirmed present in release engine DLL."

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0.5
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          LD_LIBRARY_PATH: ${{ env.LT_ENGINE_V2_LIB_DIR }}
          LT_ENGINE_V2_LIB_DIR: ${{ env.LT_ENGINE_V2_LIB_DIR }}
        with:
          projectPath: 'apps/desktop'
          args: ${{ matrix.platform == 'macos' && '--verbose --target universal-apple-darwin' || matrix.platform == 'linux' && '--verbose --bundles deb,rpm,appimage' || '--verbose' }}

      - name: Validate Linux .deb runtime linkage
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          DEB_PATH="$(find target-desktop-native -type f -name '*.deb' | head -n1)"
          if [ -z "$DEB_PATH" ]; then
            echo "::error::No .deb bundle found under target-desktop-native"
            exit 1
          fi
          echo "Inspecting: $DEB_PATH"
          dpkg-deb -I "$DEB_PATH" | sed -n '/ Depends:/p'

          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          dpkg-deb -x "$DEB_PATH" "$TMP_DIR"

          BIN="$TMP_DIR/usr/bin/libretracks-desktop"
          LIB_DIR="$TMP_DIR/usr/lib/LibreTracks"
          ENGINE="$LIB_DIR/liblt_audio_engine_v2.so"

          if [ ! -x "$BIN" ]; then
            echo "::error::Missing executable $BIN"
            exit 1
          fi
          if [ ! -f "$ENGINE" ]; then
            echo "::error::Missing native engine $ENGINE"
            find "$TMP_DIR/usr" -maxdepth 4 -type f | sort
            exit 1
          fi

          echo "--- main binary RUNPATH ---"
          readelf -d "$BIN" | grep -E 'RPATH|RUNPATH' || true
          if ! readelf -d "$BIN" | grep -q '\$ORIGIN/../lib/LibreTracks'; then
            echo "::error::Main binary RUNPATH does not include private LibreTracks lib directory"
            exit 1
          fi

          echo "--- engine RUNPATH ---"
          readelf -d "$ENGINE" | grep -E 'RPATH|RUNPATH' || true
          if ! readelf -d "$ENGINE" | grep -q '\$ORIGIN'; then
            echo "::error::Native engine RUNPATH does not include its own directory"
            exit 1
          fi

          echo "--- ldd main binary ---"
          if ldd "$BIN" | tee /tmp/libretracks-ldd-main.log | grep -q 'not found'; then
            echo "::error::Main binary has unresolved shared libraries"
            exit 1
          fi

          echo "--- ldd private libraries ---"
          for so in "$LIB_DIR"/*.so*; do
            [ -e "$so" ] || continue
            echo "Inspecting $so"
            if LD_LIBRARY_PATH="$LIB_DIR" ldd "$so" | tee -a /tmp/libretracks-ldd-private.log | grep -q 'not found'; then
              echo "::error::$so has unresolved shared libraries"
              exit 1
            fi
          done

      - name: Validate Linux .rpm contents
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          RPM_PATH="$(find target-desktop-native -type f -name '*.rpm' | head -n1)"
          if [ -z "$RPM_PATH" ]; then
            echo "::error::No .rpm bundle found under target-desktop-native"
            exit 1
          fi
          echo "Inspecting: $RPM_PATH"
          rpm -qp --requires "$RPM_PATH"

          # The .rpm packs the same payload as the .deb: the launcher in
          # /usr/bin and the private engine .so under /usr/lib/LibreTracks.
          # rpm2cpio extracts without needing the package installed.
          PAYLOAD="$(rpm -qpl "$RPM_PATH")"
          if ! echo "$PAYLOAD" | grep -q '/usr/bin/libretracks-desktop'; then
            echo "::error::.rpm payload is missing /usr/bin/libretracks-desktop"
            echo "$PAYLOAD"
            exit 1
          fi
          if ! echo "$PAYLOAD" | grep -q '/usr/lib/LibreTracks/liblt_audio_engine_v2.so'; then
            echo "::error::.rpm payload is missing the native engine liblt_audio_engine_v2.so"
            echo "$PAYLOAD"
            exit 1
          fi
          echo "Linux .rpm contents validation passed."

      - name: Validate macOS .app bundle dylib wiring
        if: matrix.platform == 'macos'
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find target-desktop-native -type d -name 'LibreTracks.app' -path '*/bundle/macos/*' | head -n1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No LibreTracks.app found under target-desktop-native"
            exit 1
          fi
          echo "Inspecting: $APP_PATH"

          BIN="$APP_PATH/Contents/MacOS/libretracks-desktop"
          FRAMEWORKS="$APP_PATH/Contents/Frameworks"

          # 1) Engine dylib must be bundled in Contents/Frameworks/
          DYLIB="$FRAMEWORKS/liblt_audio_engine_v2.dylib"
          if [ ! -f "$DYLIB" ]; then
            echo "::error::Missing $DYLIB. Tauri did not bundle the engine dylib."
            echo "Contents/Frameworks listing:"
            ls -la "$FRAMEWORKS" 2>/dev/null || echo "(directory absent)"
            exit 1
          fi

          # 2) Binary must reference engine dylib via @rpath
          echo "--- otool -L on main binary ---"
          otool -L "$BIN"
          if ! otool -L "$BIN" | grep -q '@rpath/liblt_audio_engine_v2.dylib'; then
            echo "::error::Main binary does not reference engine via @rpath."
            exit 1
          fi

          # 3) Binary must declare an LC_RPATH that resolves to Frameworks/
          echo "--- LC_RPATH entries ---"
          otool -l "$BIN" | awk '/LC_RPATH/{flag=1} flag{print; if(/path /) {flag=0}}'
          if ! otool -l "$BIN" | grep -A2 LC_RPATH | grep -q '@executable_path/../Frameworks'; then
            echo "::error::Main binary missing LC_RPATH '@executable_path/../Frameworks'. This is the crash users see on launch (Library not loaded / no LC_RPATH's found)."
            exit 1
          fi

          # 4) Engine dylib's own install_name must use @rpath
          echo "--- engine dylib install_name ---"
          ENGINE_INSTALL_NAME="$(otool -D "$DYLIB" | tail -n1)"
          echo "$ENGINE_INSTALL_NAME"
          case "$ENGINE_INSTALL_NAME" in
            @rpath/*) ;;
            *)
              echo "::error::Engine dylib install_name '$ENGINE_INSTALL_NAME' is not @rpath-relative. Set INSTALL_NAME_DIR=@rpath in CMake."
              exit 1
              ;;
          esac

          # 5) Dry-run loader resolution: ask dyld to resolve every dependency
          #    of the main binary. Will fail with the same DYLD error users hit
          #    if any @rpath dependency is unresolved.
          echo "--- DYLD_PRINT_LIBRARIES dry run ---"
          rm -f /tmp/dyld.log
          set +e
          DYLD_PRINT_LIBRARIES=1 DYLD_PRINT_RPATHS=1 "$BIN" --version > /tmp/dyld.log 2>&1 &
          DYLD_PID=$!
          for _ in $(seq 1 20); do
            if ! kill -0 "$DYLD_PID" 2>/dev/null; then
              wait "$DYLD_PID"
              DYLD_STATUS=$?
              break
            fi
            sleep 1
          done
          if kill -0 "$DYLD_PID" 2>/dev/null; then
            echo "Binary stayed running after dyld resolved startup libraries; terminating validation dry-run."
            kill "$DYLD_PID" 2>/dev/null || true
            wait "$DYLD_PID" 2>/dev/null || true
            DYLD_STATUS=124
          fi
          set -e
          cat /tmp/dyld.log
          if grep -q 'Library not loaded' /tmp/dyld.log; then
            echo "::error::Dyld could not resolve a referenced library — this is the crash from the macOS report."
            exit 1
          fi
          if [ "${DYLD_STATUS:-0}" -ne 0 ] && [ "${DYLD_STATUS:-0}" -ne 124 ]; then
            echo "Binary exited non-zero but dyld did not report missing libraries — OK."
          fi
          echo "macOS bundle validation passed."

      - name: Verify High Sierra cookie shim linked (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          # Guard against silent loss of the 10.13/10.14 compatibility shim
          # (apps/desktop/src-tauri/macos-compat/highsierra_cookie_symbols.m).
          # If a wry/Tauri bump or a build.rs change ever drops it, the binary
          # still builds and runs on the modern CI runner but crashes at launch
          # on High Sierra with "Symbol not found: _NSHTTPCookieSameSiteLax" —
          # a defect only 10.13/10.14 users hit after download. We require the
          # three symbols to be *locally defined* (nm type T/D/S/B, i.e. lower-
          # or upper-case but NOT 'U' undefined) in the shipped binary.
          APP_PATH="$(find target-desktop-native -type d -name 'LibreTracks.app' -path '*/bundle/macos/*' | head -n1)"
          BIN="$APP_PATH/Contents/MacOS/libretracks-desktop"
          if [ ! -f "$BIN" ]; then
            echo "::error::Main binary not found at $BIN"
            exit 1
          fi
          for symbol in _NSHTTPCookieSameSiteLax _NSHTTPCookieSameSiteStrict _NSHTTPCookieSameSitePolicy; do
            # A locally-defined symbol shows a defined type letter; an unresolved
            # one shows 'U'. Fail if the symbol is missing entirely or only 'U'.
            line="$(nm "$BIN" 2>/dev/null | grep -E "[0-9a-fA-F]+ [^U] $symbol$" || true)"
            if [ -z "$line" ]; then
              echo "::error::Symbol $symbol is not locally defined in the release binary. The High Sierra cookie shim was not linked — check build.rs and macos-compat/highsierra_cookie_symbols.m."
              nm "$BIN" 2>/dev/null | grep "$symbol" || echo "($symbol absent from symbol table entirely)"
              exit 1
            fi
            echo "OK: $symbol -> $line"
          done
          echo "High Sierra cookie shim confirmed linked into release binary."

      - name: Upload release assets
        if: matrix.publish
        uses: actions/upload-artifact@v4
        with:
          name: libretracks-${{ matrix.platform }}-assets
          path: target-desktop-native/**/bundle/**/*
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs: build-release-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist/release-assets
          pattern: libretracks-*-assets
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          NOTES_FILE="docs/releases/${GITHUB_REF_NAME}.md"
          NOTES_ARGS=(--notes "See the Assets section to download this version.")

          if [ -f "$NOTES_FILE" ]; then
            NOTES_ARGS=(--notes-file "$NOTES_FILE")
          fi

          mapfile -d '' ASSETS < <(
            find dist/release-assets -type f \( \
              -name '*.AppImage' -o \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*.dmg' -o \
              -name '*.exe' -o \
              -name '*.msi' -o \
              -name '*.tar.gz' -o \
              -name '*.zip' -o \
              -name '*.sig' \
            \) -print0
          )

          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release delete "$GITHUB_REF_NAME" --yes
          fi

          gh release create "$GITHUB_REF_NAME" "${ASSETS[@]}" \
            --title "LibreTracks $GITHUB_REF_NAME" \
            "${NOTES_ARGS[@]}"

  notify-website:
    name: Trigger Website Rebuild
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Send Deploy Hook to Cloudflare
        run: curl -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
